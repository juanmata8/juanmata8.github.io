  window.addEventListener("message", function (event) {
    var msg = event.data;
    if (!msg) return;
    var gd = document.querySelector(".js-plotly-plot");
    if (!gd) return;

    // ── Toggle crime visibility ──────────────────────────────────────────
    if (msg.type === "SET_TRACE_VISIBILITY") {
      if (msg.crime === LOCKED) return;
      var idx = CRIMES.indexOf(msg.crime);
      if (idx === -1) return;
      Plotly.restyle(gd, { visible: msg.visible ? true : "legendonly" }, [idx]);
    }

    // ── Update year: swap all trace data + update title annotation ───────
    if (msg.type === "SET_YEAR") {
      var year = msg.year;
      var yearData = ALL_DATA[year];
      if (!yearData) return;

      var yArrays = CRIMES.map(function(c) { return yearData[c] || []; });
      Plotly.restyle(gd, { y: yArrays }, CRIMES.map(function(_, i) { return i; }));

      Plotly.relayout(gd, {
        "annotations[0].text": "Hourly crime patterns  —  San Francisco  —  " + year
      });
    }
  });
})();
