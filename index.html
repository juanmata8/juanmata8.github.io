<!DOCTYPE html>
<html>
<head>
    <title>My Data Viz Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            line-height: 1.4;
        }

        .viz {
            margin: 2rem 0;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Hello World!</h1>
    <p>This site will soon contain interactive data visualizations about crime in San Francisco.</p>

    <div class="viz">
        <h2>Drug Offense Scatter (June-July 2016)</h2>
        <iframe src="visualizations/drug_offense_scatter_june_july_2016.html" title="Drug Offense Scatter June July 2016"></iframe>
    </div>

    <div class="viz">
        <h2>Prostitution Heatmap (All Time)</h2>
        <iframe src="visualizations/prostitution_heatmap_all_time.html" title="Prostitution Heatmap All Time"></iframe>
    </div>

    <div class="viz">
        <h2>Prostitution Heatmap with Time (2016-2018)</h2>
        <iframe src="visualizations/prostitution_heatmap_with_time_2016_2018.html" title="Prostitution Heatmap with Time 2016 2018"></iframe>
    </div>

    <div class="viz">
        <h2>SF Assault Ratio Map</h2>
        <iframe src="visualizations/sf_assault_ratio_map.html" title="SF Assault Ratio Map"></iframe>
    </div>

    <div class="viz">
        <h2>Crime Hourly (Animated by Year)</h2>
        <iframe src="visualizations/crime_hourly_animated_by_year.html" title="Crime Hourly Animated by Year"></iframe>
    </div>
</body>
</html>
